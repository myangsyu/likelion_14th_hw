{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="detail-wrapper">

    <div class="detail-header">
        <h1>{{ post.title }}</h1>
    </div>

    <div class="detail-footer">
        <span>카테고리: {{ post.category }}</span>
        <span>작성자: {{ post.writer }}</span>
        <span>작성일: {{ post.pub_date }}</span>
    </div>

    <div class="detail-body">
        <p>{{ post.content }}</p>
    </div>

    <div class="detail-actions">
        <a href="{% url 'main:edit' post.id %}" class="btn-outline">수정</a>
        <a href="{% url 'main:delete' post.id %}" class="btn-danger">삭제</a>
        <a href="{% url 'main:postpage' %}" class="btn-primary">목록으로</a>
    </div>

</div>
{% endblock %}
